<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidekick AI</title>
  <meta name="description" content="Purpose-built AI tools for professionals.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #EDEAE3;
      font-family: 'Playfair Display', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .content {
      max-width: 640px;
      width: 100%;
    }

    .wordmark {
      font-size: clamp(2.2rem, 5.5vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.025em;
      color: #252220;
      line-height: 1.0;
    }

    .wordmark em {
      font-style: italic;
      font-weight: 700;
      color: #5C574F;
    }

    .rule {
      margin-top: 1.75rem;
      border: none;
      border-top: 1px solid #C0B8AD;
      width: 3rem;
    }

    .tagline {
      margin-top: 1.5rem;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.01em;
      color: #4A453E;
      line-height: 1.5;
    }

    .date {
      margin-top: 2rem;
      font-size: 0.72rem;
      font-family: Georgia, serif;
      font-style: normal;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9A9189;
    }
  </style>
</head>
<body>
  <div class="content">
    <p class="wordmark">Sidekick <em>AI</em></p>
    <hr class="rule">
    <p class="tagline">Purpose-built AI tools for professionals.</p>
    <p class="date">June 2026</p>
  </div>
</body>
</html>
